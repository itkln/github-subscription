services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      HTTP_ADDRESS: ":8080"
      DATABASE_DSN: "postgres://postgres:postgres@db:5432/github_subscription?sslmode=disable"
    ports:
      - "8080:8080"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: github_subscription
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d github_subscription"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
